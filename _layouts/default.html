<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <!-- TODO title -->
        <title>{% if page.title %}{{ page.title }} | {% endif %}TreasuryViewer</title>
        <link rel="icon" type="image/x-icon" href="/favicon.png" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Google fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="/css/styles.css" rel="stylesheet" />
    </head>

    <body id="page-top" style="min-height: 100vh; display: flex; flex-direction: column;">
        <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
            <div class="container px-5">
                <a class="navbar-brand fw-bold" href="/">
                    <img class="d-inline-block align-text-top" src="/favicon.png" style="width: 1.5em; height: 1.5em" />
                    <span style="padding-left: 4px; padding-top: 5px; display: inline-block">TreasuryViewer</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="bi-list"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                        {% if page.navlinks %}
                            {% include {{ page.navlinks }} %}
                        {% elsif layout.navlinks %}
                            {% include {{ layout.navlinks }} %}
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>

        {{ content }}

        <div style="flex-grow:1"></div>

        <footer class="bg-black text-center py-5">
            <div class="container px-5">
                <div class="text-white-50 small">
                    <div class="mb-2">Treasury Viewer LLC All Rights Reserved.</div>
                    <a href="privacy.html">Privacy</a>
                    <span class="mx-1">&middot;</span>
                    <a href="terms.html">Terms</a>
                    <span class="mx-1">&middot;</span>
                    <a href="mailto:contact@treasuryviewer.com">contact@treasuryviewer.com</a>
                </div>
            </div>
        </footer>

        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
